<!doctype html>
<html lang="en-us">
<head>
  <meta charset="utf-8" />
  <title>Robot Check</title>
  <meta name="viewport" content="width=device-width" />
</head>
<body>
  <div class="a-container">
    <h4>Enter the characters you see below</h4>
    <p class="a-last">Sorry, we just need to make sure you're not a robot. For best results, please make sure your browser is accepting cookies.</p>
    <form method="get" action="/errors/validateCaptcha">
      <img src="https://images-na.ssl-images-amazon.com/captcha/abcd.jpg" alt="captcha" />
      <input type="text" name="field-keywords" />
    </form>
    <p>To discuss automated access to Amazon data please contact api-services-support@amazon.com.</p>
  </div>
</body>
</html>
